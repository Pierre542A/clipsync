# Vhost Nginx pour le relais ClipSync — proxy WebSocket (WSS) + HTTPS.
# Remplace clip.example.com par ton domaine, et 8787 par ton port si modifié.
#
#   /etc/nginx/sites-enabled/clip.<domaine>.conf
#   sudo nginx -t && sudo systemctl reload nginx

# HTTP -> HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name clip.example.com;
    return 301 https://clip.example.com$request_uri;
}

# HTTPS -> relais ClipSync (même vhost pour /ws WebSocket et /files, /health HTTP)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name clip.example.com;

    ssl_certificate     /etc/letsencrypt/live/clip.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/clip.example.com/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options nosniff;

    access_log /var/log/nginx/clipsync_access.log;
    error_log  /var/log/nginx/clipsync_error.log;

    # Upload fichiers/images (cf. server/src/config.js maxFileBytes)
    client_max_body_size 100m;

    location / {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;

        # Bascule WebSocket (/ws)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket longue durée (évite les coupures)
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
