<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#f4f6fb" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0a0e17" media="(prefers-color-scheme: dark)">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ClipSync">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <title>ClipSync</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <span class="logo" aria-hidden="true">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
            <rect x="8.5" y="8.5" width="11" height="11" rx="3.2" fill="currentColor" opacity="0.28"/>
            <rect x="4.5" y="4.5" width="11" height="11" rx="3.2" fill="none" stroke="currentColor" stroke-width="2"/>
          </svg>
        </span>
        <span class="wordmark">ClipSync</span>
      </div>
      <button class="icon-btn" id="settingsBtn" aria-label="Réglages">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </header>

    <div class="status">
      <span class="dot off" id="dot"></span>
      <span id="statusText">…</span>
      <span class="spacer"></span>
      <span id="statusSub"></span>
    </div>

    <div class="actions">
      <button class="primary" id="send">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 2 11 13"/><path d="M22 2 15 22l-4-9-9-4z"/>
        </svg>
        <span>Envoyer le presse-papiers</span>
      </button>
      <button class="secondary" id="sendFiles">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><path d="M13 2v7h7"/>
        </svg>
        <span>Envoyer des fichiers</span>
      </button>
      <input type="file" id="fileInput" multiple hidden>
      <div id="progress" hidden>
        <div id="progressLabel"></div>
        <div class="bar"><div id="progressBar"></div></div>
      </div>
    </div>

    <p class="hint">Copie du texte ou une image, puis <b>Envoyer le presse-papiers</b>.<br>Fichiers (zip, PDF…) : <b>Envoyer des fichiers</b>.</p>

    <section class="block">
      <h2>Reçu</h2>
      <div id="received"><div class="empty">Rien reçu pour l'instant.</div></div>
    </section>

    <section class="block">
      <h2>Appareils</h2>
      <div id="devices"><div class="empty">Aucun appareil</div></div>
    </section>
  </main>

  <dialog id="settings">
    <h3>Réglages</h3>
    <label for="cfgPhrase">Phrase de couplage <span class="lbl-note">— la même partout</span></label>
    <input id="cfgPhrase" type="password" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="ta phrase secrète">
    <label for="cfgName">Nom de cet appareil</label>
    <input id="cfgName" placeholder="iPhone de Pierre">
    <div class="dialog-actions">
      <button class="cancel" id="cfgCancel">Annuler</button>
      <button class="save" id="cfgSave">Enregistrer</button>
    </div>
  </dialog>

  <dialog id="targetPicker">
    <h3 id="targetTitle">Envoyer à</h3>
    <div id="targetList"></div>
    <div class="dialog-actions">
      <button class="cancel" id="targetCancel">Annuler</button>
    </div>
  </dialog>

  <div id="toast"></div>

  <script type="module" src="/app.js"></script>
</body>
</html>
